name: Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
    
    - name: Setup pnpm
      uses: pnpm/action-setup@v5

    - name: Install dependencies
      run: pnpm install

    - name: Build TypeScript
      run: pnpm run build
    
    - name: Run linter
      run: pnpm run lint
    
    - name: Build Docker image
      run: docker build -t telegram-summary-bot .
